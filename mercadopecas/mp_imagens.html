<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mercadopeças — Imagens de Produtos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #000391;
    --blue-dk: #000644;
    --yellow:  #fac800;
    --bg:      #fafafa;
    --white:   #ffffff;
    --gray:    #e8e8e8;
    --txt:     #1a1a1a;
    --radius:  12px;
  }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────── */
  header {
    background: var(--blue-dk);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 80px;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-img {
    height: 56px;
    width: auto;
    display: block;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.3));
    transition: transform .2s;
  }
  .logo-wrap:hover .logo-img { transform: scale(1.04); }
  .header-subtitle {
    margin-left: 4px;
    color: rgba(255,255,255,.50);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    border-left: 2px solid rgba(250,200,0,.35);
    padding-left: 20px;
  }

  /* ── HERO / SEARCH ──────────────────────────── */
  .hero {
    background: linear-gradient(160deg, #0a0ea8 0%, var(--blue-dk) 55%, #000220 100%);
    padding: 64px 40px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(250,200,0,.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: Impact, Arial Black, sans-serif;
    font-size: clamp(30px, 5vw, 52px);
    color: var(--white);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 2px 16px rgba(0,0,0,.4);
  }
  .hero h1 span { color: var(--yellow); }
  .hero p {
    color: rgba(255,255,255,.60);
    font-size: 14px;
    margin-bottom: 36px;
    letter-spacing: .5px;
  }

  .search-box {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    background: var(--white);
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    border: 3px solid var(--yellow);
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px 24px;
    font-size: 18px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--blue-dk);
    background: transparent;
  }
  .search-box input::placeholder {
    color: #aaa;
    font-weight: 400;
    letter-spacing: .5px;
  }
  .search-box button {
    background: var(--yellow);
    border: none;
    padding: 0 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .search-box button:hover { background: #e3b600; }
  .search-box button svg { width: 24px; height: 24px; fill: var(--blue-dk); }

  .search-hint {
    margin-top: 14px;
    color: rgba(255,255,255,.5);
    font-size: 12px;
  }

  /* ── MAIN ───────────────────────────────────── */
  main { padding: 36px 40px 60px; max-width: 1400px; margin: 0 auto; }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    min-height: 32px;
  }
  .status-msg {
    font-size: 14px;
    color: #666;
  }
  .badge {
    background: var(--blue);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: .5px;
  }
  .badge.yellow { background: var(--yellow); color: var(--blue-dk); }

  /* ── EMPTY STATE ────────────────────────────── */
  .empty {
    text-align: center;
    padding: 80px 20px;
  }
  .empty svg { width: 72px; height: 72px; opacity: .18; margin-bottom: 20px; }
  .empty h2 { font-size: 20px; color: #aaa; font-family: Impact, sans-serif; letter-spacing: 1px; }
  .empty p  { font-size: 13px; color: #bbb; margin-top: 8px; }

  /* ── IMAGE GRID ─────────────────────────────── */
  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--yellow);
    background: linear-gradient(90deg, rgba(250,200,0,.05) 0%, transparent 80%);
    padding-top: 10px;
    padding-left: 12px;
    border-radius: 8px 8px 0 0;
  }
  .result-header h2 {
    font-family: Impact, sans-serif;
    font-size: 22px;
    color: var(--blue-dk);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .result-header .code-chip {
    background: var(--yellow);
    color: var(--blue-dk);
    font-weight: 900;
    font-size: 14px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .result-header .count {
    margin-left: auto;
    color: #888;
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
    border: 1.5px solid var(--gray);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s, border-color .2s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 12px 32px rgba(0,3,145,.18);
    border-color: var(--yellow);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: #f5f5f5;
    display: block;
    padding: 8px;
  }
  .card-footer {
    padding: 8px 12px 10px;
    border-top: 1px solid var(--gray);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-name {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    letter-spacing: .3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-dl {
    color: var(--blue);
    font-size: 11px;
    text-decoration: none;
    font-weight: 700;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .card-dl:hover { color: var(--yellow); }

  /* ── NOT FOUND ──────────────────────────────── */
  .not-found {
    text-align: center;
    padding: 60px 20px;
    background: var(--white);
    border-radius: var(--radius);
    border: 2px dashed var(--gray);
  }
  .not-found h2 { font-size: 18px; color: #c00; font-family: Impact, sans-serif; letter-spacing: 1px; }
  .not-found p  { font-size: 13px; color: #999; margin-top: 8px; }

  /* ── LIGHTBOX ───────────────────────────────── */
  .lb-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,6,64,.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lb-overlay.open { display: flex; }
  .lb-overlay img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .lb-caption {
    color: rgba(255,255,255,.7);
    font-size: 13px;
    margin-top: 14px;
    letter-spacing: .5px;
  }
  .lb-close {
    position: absolute;
    top: 24px; right: 32px;
    background: none;
    border: 2px solid rgba(255,255,255,.3);
    color: #fff;
    font-size: 22px;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .lb-close:hover { background: rgba(255,255,255,.12); }
  .lb-nav {
    display: flex; gap: 16px; margin-top: 20px;
  }
  .lb-nav button {
    background: var(--yellow);
    border: none;
    color: var(--blue-dk);
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: background .2s;
  }
  .lb-nav button:hover { background: #e3b600; }
  .lb-nav button:disabled { opacity: .3; cursor: default; }

  /* ── FOOTER ─────────────────────────────────── */
  footer {
    background: var(--blue-dk);
    color: rgba(255,255,255,.4);
    text-align: center;
    padding: 20px;
    font-size: 12px;
    letter-spacing: .5px;
  }
  footer strong { color: var(--yellow); }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .hero  { padding: 36px 16px 32px; }
    main   { padding: 24px 16px 40px; }
    .grid  { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  }
</style>

const input   = document.getElementById('searchInput');
const results = document.getElementById('results');
const statusMsg   = document.getElementById('statusMsg');
const statusBadge = document.getElementById('statusBadge');

function showEmpty() {
  results.innerHTML = `
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000391" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <h2>PRONTO PARA BUSCAR</h2>
      <p>Informe o código do produto no campo acima</p>
    </div>`;
  statusMsg.textContent = '';
  statusBadge.innerHTML = '';
}

function normalizeCode(val) {
  // Remove prefixo M7 (case-insensitive) e sufixo 67
  let s = val.trim().toUpperCase();
  if (s.startsWith('M7')) s = s.slice(2);
  if (s.endsWith('67'))   s = s.slice(0, -2);
  return s;
}

function doSearch() {
  const raw = input.value.trim();
  if (!raw) { showEmpty(); return; }

  const normalized = normalizeCode(raw);

  // Fase 1: match exato ou zero-padded (sem partial)
  function findExact(dataset, base) {
    if (dataset[normalized]) return { code: normalized, imgs: dataset[normalized], base };
    const padded = normalized.padStart(9, '0');
    if (dataset[padded]) return { code: padded, imgs: dataset[padded], base };
    return null;
  }

  // Fase 2: partial match — só se não houve nenhum exato e query tem ≥ 4 chars
  function findPartial(dataset, base) {
    if (normalized.length < 4) return null;
    const matches = Object.keys(dataset).filter(k => k.includes(normalized));
    if (matches.length === 1) return { code: matches[0], imgs: dataset[matches[0]], base };
    if (matches.length > 1)  return { multi: matches, base };
    return null;
  }

  let r1 = findExact(DATA,    PUBLIC_BASE);
  let r2 = findExact(DATA_ML, BASE_ML);

  // Se nenhum exato → tenta partial
  if (!r1 && !r2) {
    r1 = findPartial(DATA,    PUBLIC_BASE);
    r2 = findPartial(DATA_ML, BASE_ML);
  }

  // Multi-match: se algum retornou lista, mostra seleção
  if (r1 && r1.multi) { showMultiple(normalized, r1.multi, PUBLIC_BASE); return; }
  if (r2 && r2.multi) { showMultiple(normalized, r2.multi, BASE_ML);    return; }

  if (!r1 && !r2) {
    results.innerHTML = `
      <div class="not-found">
        <h2>PRODUTO NÃO ENCONTRADO</h2>
        <p>O código <strong>${raw}</strong> não existe no banco de imagens.<br>
        Verifique o número e tente novamente.</p>
      </div>`;
    statusMsg.textContent = 'Nenhum resultado para "' + raw + '"';
    statusBadge.innerHTML = '<span class="badge" style="background:#c00">0 imagens</span>';
    return;
  }

  const total = (r1 ? r1.imgs.length : 0) + (r2 ? r2.imgs.length : 0);
  const displayCode = (r1 || r2).code;
  statusMsg.textContent = 'Produto: ' + displayCode;
  statusBadge.innerHTML = '<span class="badge yellow">' + total + ' imagem' + (total>1?'s':'') + '</span>';

  let html = `<div class="result-header">
      <h2>Produto</h2>
      <span class="code-chip">${displayCode}</span>
      <span class="count">${total} imagem${total>1?'s':''}</span>
      <button id="dlAllBtn" onclick="downloadAll()" title="Baixar todas as imagens deste produto em ZIP"
        style="margin-left:auto;display:flex;align-items:center;gap:8px;
               background:var(--blue);color:#fff;border:none;border-radius:30px;
               padding:9px 20px;font-family:Arial,sans-serif;font-size:13px;
               font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Baixar Todas (<span id="dlCount">${total}</span>)
      </button>
    </div>`;

  function buildCards(code, imgs, base, label) {
    let out = '';
    if (label) out += `<div style="grid-column:1/-1;padding:6px 0 2px;font-size:12px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;">${label}</div>`;
    imgs.forEach((fname, idx) => {
      const url = base + '/' + code + '/' + fname;
      out += `<div class="card" data-idx="${idx}" data-code="${code}" data-base="${base}">
        <img class="card-img" src="${url}" alt="${fname}" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'200\'><rect width=\'200\' height=\'200\' fill=\'%23f0f0f0\'/><text x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' fill=\'%23bbb\' font-size=\'13\'>Sem imagem</text></svg>'"/>
        <div class="card-footer">
          <span class="card-name">${fname}</span>
          <a class="card-dl" href="${url}" download="${code}_${fname}" target="_blank">⬇</a>
        </div>
      </div>`;
    });
    return out;
  }

  const showLabels = r1 && r2;
  let cards = '';
  if (r1) cards += buildCards(r1.code, r1.imgs, r1.base, showLabels ? 'Itece' : '');
  if (r2) cards += buildCards(r2.code, r2.imgs, r2.base, showLabels ? 'Mercado Livre' : '');

  results.innerHTML = html + `<div class="grid">${cards}</div>`;

  // Collect all images for lightbox (merged)
  const allImgs = [];
  if (r1) r1.imgs.forEach(f => allImgs.push({ code: r1.code, fname: f, base: r1.base }));
  if (r2) r2.imgs.forEach(f => allImgs.push({ code: r2.code, fname: f, base: r2.base }));
  _dlAll = allImgs; // expõe para downloadAll()

  results.querySelectorAll('.card').forEach((card, i) => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('card-dl')) return;
      openLightbox(allImgs, i);
    });
  });
}

function renderImages(code, imgs) {
  statusMsg.textContent = 'Produto: ' + code;
  statusBadge.innerHTML = '<span class="badge yellow">' + imgs.length + ' imagem' + (imgs.length>1?'s':'') + '</span>';

  const cards = imgs.map((fname, idx) => {
    const url = activeBase + '/' + code + '/' + fname;
    return `<div class="card" data-idx="${idx}" data-code="${code}">
      <img class="card-img" src="${url}" alt="${fname}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'200\'><rect width=\'200\' height=\'200\' fill=\'%23f0f0f0\'/><text x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' fill=\'%23bbb\' font-size=\'13\'>Sem imagem</text></svg>'"/>
      <div class="card-footer">
        <span class="card-name">${fname}</span>
        <a class="card-dl" href="${url}" download="${code}_${fname}" target="_blank">⬇</a>
      </div>
    </div>`;
  }).join('');

  results.innerHTML = `
    <div class="result-header">
      <h2>Produto</h2>
      <span class="code-chip">${code}</span>
      <span class="count">${imgs.length} imagem${imgs.length>1?'s':''}</span>
    </div>
    <div class="grid">${cards}</div>`;

  // Bind cards to lightbox
  results.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('card-dl')) return;
      openLightbox(code, imgs, parseInt(card.dataset.idx), activeBase);
    });
  });
}

function showMultiple(query, matches, base) {
  statusMsg.textContent = matches.length + ' produtos encontrados para "' + query + '"';
  statusBadge.innerHTML = '<span class="badge">' + matches.length + ' resultados</span>';
  const items = matches.slice(0, 50).map(code =>
    `<div class="card" style="cursor:pointer;padding:16px 20px;display:flex;align-items:center;gap:12px;"
          onclick="document.getElementById('searchInput').value='${code}';doSearch()">
       <span style="font-weight:900;font-size:15px;color:#000391;letter-spacing:1px">${code}</span>
       <span style="font-size:12px;color:#888">${DATA[code].length} imagem${DATA[code].length>1?'s':''}</span>
     </div>`).join('');
  const extra = matches.length > 50 ? `<p style="text-align:center;color:#888;padding:16px;font-size:13px">... e mais ${matches.length-50} resultados. Refine a busca.</p>` : '';
  results.innerHTML = `
    <div class="result-header"><h2>Múltiplos resultados</h2><span class="count">para "${query}"</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">${items}</div>${extra}`;
}

// ── Download All ──────────────────────────────
let _dlAll = []; // lista atual de {code, fname, base}

async function downloadAll() {
  if (!_dlAll.length) return;
  const btn = document.getElementById('dlAllBtn');
  const zip = new JSZip();
  const total = _dlAll.length;
  let done = 0;

  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Preparando 0/${total}…`;

  const BATCH = 10;
  for (let i = 0; i < _dlAll.length; i += BATCH) {
    const chunk = _dlAll.slice(i, i + BATCH);
    await Promise.all(chunk.map(async ({code, fname, base}) => {
      try {
        const res = await fetch(base + '/' + code + '/' + fname);
        if (res.ok) {
          const blob = await res.blob();
          zip.file(code + '_' + fname, blob);
        }
      } catch(e) {}
      done++;
      if (btn) btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Baixando ${done}/${total}…`;
    }));
  }

  const code = _dlAll[0].code;
  const zipBlob = await zip.generateAsync({type:'blob', compression:'STORE'});
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url; a.download = code + '_imagens.zip';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Baixar Todas (${total})`;
}

// ── Lightbox ──────────────────────────────────
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lbImg');
const lbCap   = document.getElementById('lbCaption');
const lbPrev  = document.getElementById('lbPrev');
const lbNext  = document.getElementById('lbNext');

let lbAll = [], lbIdx = 0;
function openLightbox(all, idx) {
  lbAll = all; lbIdx = idx;
  updateLightbox();
  lb.classList.add('open');
}
function updateLightbox() {
  const item = lbAll[lbIdx];
  lbImg.src = item.base + '/' + item.code + '/' + item.fname;
  lbCap.textContent = item.code + ' · ' + item.fname + ' · ' + (lbIdx+1) + ' / ' + lbAll.length;
  lbPrev.disabled = lbIdx === 0;
  lbNext.disabled = lbIdx === lbAll.length - 1;
}
document.getElementById('lbClose').onclick = () => lb.classList.remove('open');
lbPrev.onclick = () => { if (lbIdx > 0) { lbIdx--; updateLightbox(); } };
lbNext.onclick = () => { if (lbIdx < lbAll.length-1) { lbIdx++; updateLightbox(); } };
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });

// ── Keyboard ──────────────────────────────────
input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('keydown', e => {
  if (lb.classList.contains('open')) {
    if (e.key === 'ArrowLeft'  && lbIdx > 0)             { lbIdx--; updateLightbox(); }
    if (e.key === 'ArrowRight' && lbIdx < lbAll.length-1) { lbIdx++; updateLightbox(); }
    if (e.key === 'Escape') lb.classList.remove('open');
  }
});
document.getElementById('searchBtn').onclick = doSearch;

// ── Focus & init ─────────────────────────────
input.focus();
showEmpty();
</script>
