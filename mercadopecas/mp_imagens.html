<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mercadopeças — Imagens de Produtos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #000391;
    --blue-dk: #000644;
    --yellow:  #fac800;
    --bg:      #fafafa;
    --white:   #ffffff;
    --gray:    #e8e8e8;
    --txt:     #1a1a1a;
    --radius:  12px;
  }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────── */
  header {
    background: var(--blue-dk);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 72px;
    box-shadow: 0 3px 12px rgba(0,0,0,.35);
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 44px; height: 44px; }
  .logo-text {
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo-text span.m { color: var(--yellow); }
  .logo-text span.p { color: var(--white); }
  .header-subtitle {
    margin-left: 8px;
    color: rgba(255,255,255,.55);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 400;
    border-left: 2px solid rgba(255,255,255,.2);
    padding-left: 16px;
  }

  /* ── HERO / SEARCH ──────────────────────────── */
  .hero {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dk) 100%);
    padding: 52px 40px 44px;
    text-align: center;
  }
  .hero h1 {
    font-family: Impact, Arial Black, sans-serif;
    font-size: clamp(28px, 4vw, 46px);
    color: var(--white);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .hero h1 span { color: var(--yellow); }
  .hero p {
    color: rgba(255,255,255,.65);
    font-size: 14px;
    margin-bottom: 32px;
    letter-spacing: .3px;
  }

  .search-box {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    background: var(--white);
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    border: 3px solid var(--yellow);
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px 24px;
    font-size: 18px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--blue-dk);
    background: transparent;
  }
  .search-box input::placeholder {
    color: #aaa;
    font-weight: 400;
    letter-spacing: .5px;
  }
  .search-box button {
    background: var(--yellow);
    border: none;
    padding: 0 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .search-box button:hover { background: #e3b600; }
  .search-box button svg { width: 24px; height: 24px; fill: var(--blue-dk); }

  .search-hint {
    margin-top: 14px;
    color: rgba(255,255,255,.5);
    font-size: 12px;
  }

  /* ── MAIN ───────────────────────────────────── */
  main { padding: 36px 40px 60px; max-width: 1400px; margin: 0 auto; }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    min-height: 32px;
  }
  .status-msg {
    font-size: 14px;
    color: #666;
  }
  .badge {
    background: var(--blue);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: .5px;
  }
  .badge.yellow { background: var(--yellow); color: var(--blue-dk); }

  /* ── EMPTY STATE ────────────────────────────── */
  .empty {
    text-align: center;
    padding: 80px 20px;
  }
  .empty svg { width: 72px; height: 72px; opacity: .18; margin-bottom: 20px; }
  .empty h2 { font-size: 20px; color: #aaa; font-family: Impact, sans-serif; letter-spacing: 1px; }
  .empty p  { font-size: 13px; color: #bbb; margin-top: 8px; }

  /* ── IMAGE GRID ─────────────────────────────── */
  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 3px solid var(--yellow);
  }
  .result-header h2 {
    font-family: Impact, sans-serif;
    font-size: 22px;
    color: var(--blue-dk);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .result-header .code-chip {
    background: var(--yellow);
    color: var(--blue-dk);
    font-weight: 900;
    font-size: 14px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .result-header .count {
    margin-left: auto;
    color: #888;
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    border: 1px solid var(--gray);
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,3,145,.15);
    border-color: var(--yellow);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: #f5f5f5;
    display: block;
    padding: 8px;
  }
  .card-footer {
    padding: 8px 12px 10px;
    border-top: 1px solid var(--gray);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-name {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    letter-spacing: .3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-dl {
    color: var(--blue);
    font-size: 11px;
    text-decoration: none;
    font-weight: 700;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .card-dl:hover { color: var(--yellow); }

  /* ── NOT FOUND ──────────────────────────────── */
  .not-found {
    text-align: center;
    padding: 60px 20px;
    background: var(--white);
    border-radius: var(--radius);
    border: 2px dashed var(--gray);
  }
  .not-found h2 { font-size: 18px; color: #c00; font-family: Impact, sans-serif; letter-spacing: 1px; }
  .not-found p  { font-size: 13px; color: #999; margin-top: 8px; }

  /* ── LIGHTBOX ───────────────────────────────── */
  .lb-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,6,64,.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lb-overlay.open { display: flex; }
  .lb-overlay img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .lb-caption {
    color: rgba(255,255,255,.7);
    font-size: 13px;
    margin-top: 14px;
    letter-spacing: .5px;
  }
  .lb-close {
    position: absolute;
    top: 24px; right: 32px;
    background: none;
    border: 2px solid rgba(255,255,255,.3);
    color: #fff;
    font-size: 22px;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .lb-close:hover { background: rgba(255,255,255,.12); }
  .lb-nav {
    display: flex; gap: 16px; margin-top: 20px;
  }
  .lb-nav button {
    background: var(--yellow);
    border: none;
    color: var(--blue-dk);
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: background .2s;
  }
  .lb-nav button:hover { background: #e3b600; }
  .lb-nav button:disabled { opacity: .3; cursor: default; }

  /* ── FOOTER ─────────────────────────────────── */
  footer {
    background: var(--blue-dk);
    color: rgba(255,255,255,.4);
    text-align: center;
    padding: 20px;
    font-size: 12px;
    letter-spacing: .5px;
  }
  footer strong { color: var(--yellow); }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .hero  { padding: 36px 16px 32px; }
    main   { padding: 24px 16px 40px; }
    .grid  { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo-wrap" href="#">
    <div class="logo-icon">
      <!-- Simplified MP mascot SVG -->
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <!-- helmet -->
        <ellipse cx="18" cy="7" rx="7" ry="4.5" fill="#fac800"/>
        <rect x="11" y="9" width="14" height="3" rx="1.5" fill="#fac800"/>
        <!-- body -->
        <ellipse cx="18" cy="12" rx="3" ry="3" fill="#fac800"/>
        <line x1="18" y1="15" x2="15" y2="24" stroke="#fac800" stroke-width="3.5" stroke-linecap="round"/>
        <!-- arms -->
        <line x1="17" y1="18" x2="10" y2="16" stroke="#fac800" stroke-width="3" stroke-linecap="round"/>
        <line x1="17" y1="18" x2="26" y2="20" stroke="#fac800" stroke-width="3" stroke-linecap="round"/>
        <!-- legs -->
        <line x1="15" y1="24" x2="11" y2="32" stroke="#fac800" stroke-width="3" stroke-linecap="round"/>
        <line x1="15" y1="24" x2="19" y2="32" stroke="#fac800" stroke-width="3" stroke-linecap="round"/>
        <!-- cart body -->
        <rect x="26" y="18" width="14" height="10" rx="2" fill="#ffffff" fill-opacity=".9"/>
        <!-- cart wheels -->
        <circle cx="29" cy="31" r="2.2" fill="#ffffff" fill-opacity=".8"/>
        <circle cx="37" cy="31" r="2.2" fill="#ffffff" fill-opacity=".8"/>
        <!-- cart handle -->
        <line x1="26" y1="20" x2="22" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <!-- boxes in cart -->
        <rect x="27" y="11" width="6" height="7" rx="1" fill="#fac800" transform="rotate(15 30 14)"/>
        <rect x="33" y="10" width="5" height="6" rx="1" fill="#fac800" transform="rotate(-10 35 13)"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="m">mercado</span><span class="p">peças</span>
    </div>
  </a>
  <span class="header-subtitle">Imagens de Produtos</span>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Banco de <span>Imagens</span></h1>
  <p>Digite o código do produto para visualizar todas as fotos disponíveis</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Ex: M7000061501"
           autocomplete="off" autocorrect="off" spellcheck="false"
           inputmode="numeric" maxlength="20"/>
    <button id="searchBtn" title="Buscar (Enter)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
              stroke="#000391" stroke-width="2.5" stroke-linecap="round"
              fill="none"/>
      </svg>
    </button>
  </div>
  <p class="search-hint">Pressione <strong>Enter</strong> para buscar &nbsp;·&nbsp; <span id="totalCount"></span></p>
</div>

<!-- MAIN -->
<main>
  <div class="status-bar">
    <span class="status-msg" id="statusMsg"></span>
    <span id="statusBadge"></span>
  </div>
  <div id="results"></div>
</main>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <img id="lbImg" src="" alt=""/>
  <div class="lb-caption" id="lbCaption"></div>
  <div class="lb-nav">
    <button id="lbPrev">&#8592; Anterior</button>
    <button id="lbNext">Próxima &#8594;</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  &copy; 2026 <strong>mercadopeças</strong> · O shopping do mecânico · Banco de imagens interno
</footer>

// ── Init ──────────────────────────────────────
const totalCodes = Object.keys(DATA).length;
const totalImgs  = Object.values(DATA).reduce((a,v)=>a+v.length,0);
document.getElementById('totalCount').textContent =
  totalCodes.toLocaleString('pt-BR') + ' produtos · ' + totalImgs.toLocaleString('pt-BR') + ' imagens';

// ── Search ────────────────────────────────────
const input   = document.getElementById('searchInput');
const results = document.getElementById('results');
const statusMsg   = document.getElementById('statusMsg');
const statusBadge = document.getElementById('statusBadge');

function showEmpty() {
  results.innerHTML = `
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000391" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <h2>PRONTO PARA BUSCAR</h2>
      <p>Informe o código do produto no campo acima</p>
    </div>`;
  statusMsg.textContent = '';
  statusBadge.innerHTML = '';
}

function normalizeCode(val) {
  // Remove prefixo M7 (case-insensitive) e sufixo 67
  let s = val.trim().toUpperCase();
  if (s.startsWith('M7')) s = s.slice(2);
  if (s.endsWith('67'))   s = s.slice(0, -2);
  return s;
}

function doSearch() {
  const raw = input.value.trim();
  if (!raw) { showEmpty(); return; }

  // Normaliza: descarta prefixo M7 e sufixo 67
  const normalized = normalizeCode(raw);

  // Try exact match first, then padded zeros
  let code = normalized;
  let imgs = DATA[code];

  // Try zero-padded to 9 digits
  if (!imgs) {
    const padded = normalized.padStart(9, '0');
    if (DATA[padded]) { code = padded; imgs = DATA[code]; }
  }

  // Try partial match if still not found
  if (!imgs) {
    const matches = Object.keys(DATA).filter(k => k.includes(normalized));
    if (matches.length === 1) {
      code = matches[0];
      imgs = DATA[code];
    } else if (matches.length > 1) {
      showMultiple(raw, matches);
      return;
    }
  }

  if (!imgs || imgs.length === 0) {
    results.innerHTML = `
      <div class="not-found">
        <h2>PRODUTO NÃO ENCONTRADO</h2>
        <p>O código <strong>${raw}</strong> não existe no banco de imagens.<br>
        Verifique o número e tente novamente.</p>
      </div>`;
    statusMsg.textContent = 'Nenhum resultado para "' + raw + '"';
    statusBadge.innerHTML = '<span class="badge" style="background:#c00">0 imagens</span>';
    return;
  }

  renderImages(code, imgs);
}

function renderImages(code, imgs) {
  statusMsg.textContent = 'Produto: ' + code;
  statusBadge.innerHTML = '<span class="badge yellow">' + imgs.length + ' imagem' + (imgs.length>1?'s':'') + '</span>';

  const cards = imgs.map((fname, idx) => {
    const url = PUBLIC_BASE + '/' + code + '/' + fname;
    return `<div class="card" data-idx="${idx}" data-code="${code}">
      <img class="card-img" src="${url}" alt="${fname}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'200\'><rect width=\'200\' height=\'200\' fill=\'%23f0f0f0\'/><text x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' fill=\'%23bbb\' font-size=\'13\'>Sem imagem</text></svg>'"/>
      <div class="card-footer">
        <span class="card-name">${fname}</span>
        <a class="card-dl" href="${url}" download="${code}_${fname}" target="_blank">⬇</a>
      </div>
    </div>`;
  }).join('');

  results.innerHTML = `
    <div class="result-header">
      <h2>Produto</h2>
      <span class="code-chip">${code}</span>
      <span class="count">${imgs.length} imagem${imgs.length>1?'s':''}</span>
    </div>
    <div class="grid">${cards}</div>`;

  // Bind cards to lightbox
  results.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('card-dl')) return;
      openLightbox(code, imgs, parseInt(card.dataset.idx));
    });
  });
}

function showMultiple(query, matches) {
  statusMsg.textContent = matches.length + ' produtos encontrados para "' + query + '"';
  statusBadge.innerHTML = '<span class="badge">' + matches.length + ' resultados</span>';
  const items = matches.slice(0, 50).map(code =>
    `<div class="card" style="cursor:pointer;padding:16px 20px;display:flex;align-items:center;gap:12px;"
          onclick="document.getElementById('searchInput').value='${code}';doSearch()">
       <span style="font-weight:900;font-size:15px;color:#000391;letter-spacing:1px">${code}</span>
       <span style="font-size:12px;color:#888">${DATA[code].length} imagem${DATA[code].length>1?'s':''}</span>
     </div>`).join('');
  const extra = matches.length > 50 ? `<p style="text-align:center;color:#888;padding:16px;font-size:13px">... e mais ${matches.length-50} resultados. Refine a busca.</p>` : '';
  results.innerHTML = `
    <div class="result-header"><h2>Múltiplos resultados</h2><span class="count">para "${query}"</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">${items}</div>${extra}`;
}

// ── Lightbox ──────────────────────────────────
let lbCode='', lbImgs=[], lbIdx=0;
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lbImg');
const lbCap   = document.getElementById('lbCaption');
const lbPrev  = document.getElementById('lbPrev');
const lbNext  = document.getElementById('lbNext');

function openLightbox(code, imgs, idx) {
  lbCode = code; lbImgs = imgs; lbIdx = idx;
  updateLightbox();
  lb.classList.add('open');
}
function updateLightbox() {
  const fname = lbImgs[lbIdx];
  lbImg.src = PUBLIC_BASE + '/' + lbCode + '/' + fname;
  lbCap.textContent = lbCode + ' · ' + fname + ' · ' + (lbIdx+1) + ' / ' + lbImgs.length;
  lbPrev.disabled = lbIdx === 0;
  lbNext.disabled = lbIdx === lbImgs.length - 1;
}
document.getElementById('lbClose').onclick = () => lb.classList.remove('open');
lbPrev.onclick = () => { if (lbIdx > 0) { lbIdx--; updateLightbox(); } };
lbNext.onclick = () => { if (lbIdx < lbImgs.length-1) { lbIdx++; updateLightbox(); } };
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });

// ── Keyboard ──────────────────────────────────
input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('keydown', e => {
  if (lb.classList.contains('open')) {
    if (e.key === 'ArrowLeft' && lbIdx > 0)                { lbIdx--; updateLightbox(); }
    if (e.key === 'ArrowRight' && lbIdx < lbImgs.length-1) { lbIdx++; updateLightbox(); }
    if (e.key === 'Escape') lb.classList.remove('open');
  }
});
document.getElementById('searchBtn').onclick = doSearch;

// ── Focus & init ─────────────────────────────
input.focus();
showEmpty();
</script>
