<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Dashboards — Felipe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.85rem; color: #64748b; margin-top: 2px; }

    .refresh-btn {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all .2s;
    }
    .refresh-btn:hover { background: #334155; color: #e2e8f0; }

    .grid {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      border-color: #f97316;
      background: #1e2d3d;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(249,115,22,.15);
    }

    .card-icon {
      width: 36px; height: 36px;
      background: rgba(249,115,22,.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .card-meta {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: auto;
    }

    .card-tag {
      display: inline-block;
      background: rgba(249,115,22,.12);
      color: #fb923c;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }

    .status {
      max-width: 860px;
      margin: 0 auto 24px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .loading {
      max-width: 860px;
      margin: 60px auto;
      text-align: center;
      color: #64748b;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">📊</div>
  <div>
    <h1>Meus Dashboards</h1>
    <p>felipe@mercadopecas.com</p>
  </div>
  <button class="refresh-btn" onclick="loadFiles()">↻ Atualizar</button>
</header>

<div class="status" id="status">Carregando...</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Buscando arquivos...</p>
</div>

<div class="grid" id="grid"></div>

<script>
  const REPO = "felipe362/dashboards";
  const BASE_URL = "https://dashboards.felipe-3bb.workers.dev";

  function formatName(filename) {
    return filename
      .replace(/\.html$/i, '')
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  async function loadFiles() {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('status').textContent = 'Carregando...';

    try {
      const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      const files = await resp.json();
      const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('status').textContent = `${htmlFiles.length} dashboard${htmlFiles.length !== 1 ? 's' : ''} publicado${htmlFiles.length !== 1 ? 's' : ''} — atualizado agora`;

      const grid = document.getElementById('grid');

      if (htmlFiles.length === 0) {
        grid.innerHTML = '<p style="color:#64748b;grid-column:1/-1">Nenhum arquivo HTML encontrado no repositório.</p>';
        return;
      }

      htmlFiles.forEach(file => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `${BASE_URL}/${file.name}`;
        card.target = '_blank';
        card.rel = 'noopener';
        card.innerHTML = `
          <div class="card-icon">📄</div>
          <div class="card-name">${formatName(file.name)}</div>
          <div class="card-meta">
            <span class="card-tag">HTML</span>
            &nbsp;${formatSize(file.size)}
          </div>
        `;
        grid.appendChild(card);
      });

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('status').textContent = 'Erro ao carregar arquivos.';
      document.getElementById('grid').innerHTML = `<p style="color:#ef4444;grid-column:1/-1">Erro: ${e.message}</p>`;
    }
  }

  loadFiles();
</script>

</body>
</html>
