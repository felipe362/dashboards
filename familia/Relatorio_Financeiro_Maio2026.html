<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Relatório Financeiro Familiar — Maio 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--primary:#1e3a5f;--accent:#e8a020;--green:#2d8a4e;--red:#c0392b;--blue:#2980b9;--light:#f5f7fa;--border:#dde3ec;--text:#2c3e50;--muted:#6b7c93}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2f7;color:var(--text);font-size:14px}
.header{background:linear-gradient(135deg,var(--primary) 0%,#2d5986 100%);color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:8px}
.summary-cards{display:flex;gap:12px;flex-wrap:wrap;padding:16px 24px;background:#fff;border-bottom:2px solid var(--border)}
.card{background:var(--light);border-left:4px solid var(--accent);border-radius:8px;padding:12px 16px;min-width:160px;flex:1}
.card.green{border-left-color:var(--green)}
.card.red{border-left-color:var(--red)}
.card.blue{border-left-color:var(--blue)}
.card label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:1.2rem;font-weight:700;color:var(--primary);margin-top:4px}
.card .sub{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;flex-wrap:wrap;background:#fff;border-bottom:2px solid var(--border);padding:0 16px}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--primary)}
.tab-content{display:none;padding:20px 24px;max-width:1200px;margin:0 auto}
.tab-content.active{display:block}
h2{font-size:1.1rem;color:var(--primary);margin-bottom:16px;border-left:4px solid var(--accent);padding-left:10px}
h3{font-size:.95rem;color:var(--primary);margin:16px 0 8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}.summary-cards{flex-direction:column}.tabs{overflow-x:auto}}
.chart-box{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);position:relative;min-height:260px}
.chart-box canvas{max-height:260px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);font-size:13px}
th{background:var(--primary);color:#fff;padding:9px 11px;text-align:left;font-size:12px;white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:#f0f4fa}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge.ess{background:#d4edda;color:#1a7a36}
.badge.non{background:#ffe0e0;color:#b01c1c}
.badge.pont{background:#fff3cd;color:#856404}
.badge.maybe{background:#e8f4fd;color:#1a5276}
.insight-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--green)}
.insight-card.warn{border-left-color:var(--red)}
.insight-card.info{border-left-color:var(--blue)}
.insight-card.tip{border-left-color:var(--accent)}
.insight-card h4{font-size:.9rem;margin-bottom:6px;color:var(--primary)}
.insight-card p{font-size:13px;color:var(--text);line-height:1.5}
.whatsapp-box{background:#075e54;color:#fff;border-radius:12px;padding:20px;font-family:monospace;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.section-box{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.progress-bar{background:#e9ecef;border-radius:6px;height:18px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#fff;font-weight:600;transition:width .4s}
.input-group{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.input-group label{font-size:12px;color:var(--muted);min-width:120px}
.input-group input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:120px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-bar input,.filter-bar select{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
.tag{display:inline-block;background:var(--light);border:1px solid var(--border);border-radius:12px;padding:2px 10px;font-size:11px;margin:2px;cursor:pointer}
.tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.note{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px}
.total-row td{font-weight:700;background:#f0f4fa}
.highlight{background:#fffde7 !important}
.text-right{text-align:right}
.text-center{text-align:center}
</style>
</head>

const fmt = n => n.toLocaleString('pt-BR');

const fmtBrl = n => 'R$ ' + ((n/USD_RATE)*BRL_RATE).toFixed(2);
const totalMonth = transactions.reduce((s,t) => s + t.total, 0);

// ─── SUMMARY CARDS ──────────────────────────────────────────────────────────

  const essTotal = transactions.filter(t=>t.essential).reduce((s,t)=>s+t.total,0);
  const nonEss = totalMonth - essTotal;
  const html = `
    <div class="card"><label>Total Maio 2026</label><div class="val">${fmtGs(totalMonth)}</div><div class="sub">${fmtUsd(totalMonth)} | ${fmtBrl(totalMonth)}</div></div>

    <div class="card green"><label>Essencial</label><div class="val">${fmtGs(essTotal)}</div><div class="sub">${(essTotal/totalMonth*100).toFixed(1)}% do total</div></div>
    <div class="card red"><label>Não essencial</label><div class="val">${fmtGs(nonEss)}</div><div class="sub">${(nonEss/totalMonth*100).toFixed(1)}% do total</div></div>
    <div class="card"><label>Taxa estimada USD/Gs</label><div class="val">7.600 Gs/USD</div><div class="sub">Taxa média estimada Mai/26</div></div>
    <div class="card"><label>Em Reais (est.)</label><div class="val">${fmtBrl(totalMonth)}</div><div class="sub">USD/BRL est.: R$ 5,80</div></div>
  `;
  document.getElementById('summaryCards').innerHTML = html;
}

    else if(day>=8&&day<=14) weeks.W2+=t.total;
    else if(day>=15&&day<=21) weeks.W3+=t.total;

function filterTable() {
  const q = document.getElementById('searchTx').value.toLowerCase();
  const cat = document.getElementById('filterCat').value;
  const ess = document.getElementById('filterEss').value;
  const rows = document.querySelectorAll('#txTable tbody tr');
  rows.forEach(r => {
    const text = r.textContent.toLowerCase();
    const show = (!q||text.includes(q)) && (!cat||text.includes(cat.toLowerCase())) && (!ess||text.includes(ess==='true'?'essencial':'não ess'));
    r.style.display = show?'':'none';
  });
}

function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  const builders = {tab1:buildTab1,tab2:buildTab2,tab3:buildTab3,tab4:buildTab4,tab5:buildTab5,tab6:buildTab6,tab7:buildTab7,tab8:buildTab8,tab9:buildTab9,tab10:buildTab10,tab11:buildTab11,tab12:buildTab12,tab13:buildTab13};

}
